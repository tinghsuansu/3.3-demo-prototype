<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Kit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
    user-select: none;
  }

  /* ── Circular display ── */
  #display {
    width: 460px;
    height: 460px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    background: #000;
    box-shadow: 0 0 0 2px #333, 0 0 40px rgba(0,0,0,0.8);
  }

  /* ── Demo panels ── */
  .demo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }

  .demo.active {
    opacity: 1;
    pointer-events: all;
  }

  /* placeholder styling */
  .demo-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #fff;
  }
  .demo-placeholder .label {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: 4px;
    opacity: 0.15;
  }
  .demo-placeholder .sublabel {
    font-size: 13px;
    opacity: 0.3;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Demo switcher ── */
  #remote {
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    border-radius: 40px;
    padding: 10px 20px;
  }

  .nav-btn {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #aaa;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .nav-btn:hover  { background: #3a3a3a; border-color: #666; color: #fff; }
  .nav-btn:active { background: #555;    border-color: #999; color: #fff; }

  #dots {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .dot-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #444;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .dot-wrap:hover .dot { background: #888; }

  .dot-wrap.active .dot {
    background: #a78bfa;
    transform: scale(1.3);
    box-shadow: 0 0 8px rgba(167, 139, 250, 0.7);
  }

  .dot-label {
    font-size: 10px;
    color: #555;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .dot-wrap:hover  .dot-label { color: #888; }
  .dot-wrap.active .dot-label { color: #a78bfa; font-weight: 600; }

  /* ── Footer: timer + pagination ── */
  #footer {
    margin-top: 16px;
    width: 460px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #progress-track {
    width: 100%;
    height: 2px;
    background: #222;
    border-radius: 1px;
    overflow: hidden;
  }

  #progress-fill {
    height: 100%;
    width: 0%;
    background: #a78bfa;
    border-radius: 1px;
  }

  #footer-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #timer {
    font-size: 12px;
    color: #444;
    font-family: 'Courier New', monospace;
    letter-spacing: 1.5px;
    font-variant-numeric: tabular-nums;
  }

  #pagination {
    font-size: 11px;
    color: #444;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #pagination .demo-name {
    color: #a78bfa;
    font-weight: 600;
  }

  /* ── Step pagination (M01 + M02 + C01) ── */
  #m02-steps, #m01-steps, #c01-steps {
    display: none;
    width: 460px;
    margin-top: 10px;
    flex-wrap: wrap;
    gap: 3px;
    justify-content: center;
  }

  .m02-step {
    width: 33px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 5px 2px 4px;
    border-radius: 6px;
    border: 1px solid #232323;
    background: #161616;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .m02-step:hover { background: #242424; border-color: #3a3a3a; }
  .m02-step.m02-active { background: #1e1530; border-color: #7c3aed; }

  .m02-step-num {
    font-size: 11px;
    font-weight: 700;
    color: #555;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .m02-step.m02-active .m02-step-num { color: #a78bfa; }

  .m02-step-name {
    font-size: 7px;
    color: #3a3a3a;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    line-height: 1;
    text-align: center;
  }
  .m02-step.m02-active .m02-step-name { color: #7c5fc8; }
</style>
</head>
<body>

<!-- Demo switcher -->
<div id="remote">
  <button class="nav-btn" id="btn-prev" title="Previous (←)">&#8592;</button>

  <div id="dots">
    <div class="dot-wrap active" data-index="0"><div class="dot"></div><span class="dot-label">M01</span></div>
    <div class="dot-wrap"        data-index="1"><div class="dot"></div><span class="dot-label">M02</span></div>
    <div class="dot-wrap"        data-index="2"><div class="dot"></div><span class="dot-label">C01</span></div>
  </div>

  <button class="nav-btn" id="btn-next" title="Next (→)">&#8594;</button>
</div>

<div id="display">

  <!-- M01: AI companion (Kiro) -->
  <div class="demo active" id="demo-M01"></div>

  <!-- M02: Automotive cluster/HUD -->
  <div class="demo" id="demo-M02"></div>

  <!-- C01: Museum AR companion -->
  <div class="demo" id="demo-C01"></div>

</div>

<!-- Step pagination (shown only for the active demo) -->
<div id="m02-steps"></div>
<div id="m01-steps"></div>
<div id="c01-steps"></div>

<!-- Timer + pagination -->
<div id="footer">
  <div id="progress-track"><div id="progress-fill"></div></div>
  <div id="footer-info">
    <span id="timer">0:00</span>
    <span id="pagination"><span class="demo-name">M01</span>&nbsp;·&nbsp;1 / 3</span>
  </div>
</div>

<script src="m01-demo.js"></script>
<script src="m02-demo.js"></script>
<script src="c01-demo.js"></script>
<script>
  const demos = ['M01', 'M02', 'C01'];
  // M01 = AI companion (m02-demo.js exports mountM02)
  // M02 = automotive cluster (m01-demo.js exports mountM01)
  // C01 = museum (c01-demo.js exports mountC01)
  const demoDurations = { M01: 59, M02: 65, C01: null };

  let current = 0;
  const panels   = demos.map(id => document.getElementById('demo-' + id));
  const dotWraps = document.querySelectorAll('.dot-wrap');

  // ── Timer ──
  let timerInterval = null;

  // Generic step-sync state (only one demo owns it at a time)
  let stepSyncActive  = false;
  let stepStartMs     = 0;   // cumulative ms at start of current step
  let stepActivatedAt = 0;   // Date.now() when current step activated
  let stepTotalMs     = 0;   // sum of all step durations

  function fmtMs(ms) {
    const s = Math.floor(ms / 1000);
    return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
  }

  function startTimer(id) {
    clearInterval(timerInterval);
    const fill    = document.getElementById('progress-fill');
    const timerEl = document.getElementById('timer');
    const duration = demoDurations[id];

    if (!stepSyncActive) {
      fill.style.transition = 'none';
      fill.style.width = '0%';
      timerEl.textContent = '0:00';
    }

    let elapsed = 0;
    timerInterval = setInterval(() => {
      if (stepSyncActive) {
        const curMs = Math.min(stepStartMs + (Date.now() - stepActivatedAt), stepTotalMs);
        timerEl.textContent = `${fmtMs(curMs)} / ${fmtMs(stepTotalMs)}`;
      } else {
        elapsed++;
        const m = Math.floor(elapsed / 60);
        const s = elapsed % 60;
        timerEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
        if (duration) {
          const pct = Math.min((elapsed / duration) * 100, 100);
          fill.style.transition = 'width 1s linear';
          fill.style.width = pct + '%';
          if (elapsed >= duration) elapsed = 0;
        }
      }
    }, 250);
  }

  // ── Pagination ──
  function updatePagination(id) {
    const idx = demos.indexOf(id) + 1;
    document.getElementById('pagination').innerHTML =
      `<span class="demo-name">${id}</span>&nbsp;·&nbsp;${idx}&thinsp;/&thinsp;${demos.length}`;
  }

  // ── Step pagination (shared by M01 + M02) ──
  function buildSteps(stepsEl, controller, syncFill) {
    if (syncFill === undefined) syncFill = true;
    stepsEl.innerHTML = '';
    controller.names.forEach((name, i) => {
      const chip = document.createElement('div');
      chip.className = 'm02-step';
      chip.innerHTML =
        `<span class="m02-step-num">${i + 1}</span>` +
        `<span class="m02-step-name">${name}</span>`;
      chip.addEventListener('click', () => controller.goTo(i));
      stepsEl.appendChild(chip);
    });

    const durations = controller.durations;
    const total = durations.reduce((a, b) => a + b, 0);
    stepTotalMs = total;
    let cum = 0;
    const startPct = [];
    const startMs  = [];
    durations.forEach(d => {
      startPct.push(cum / total * 100);
      startMs.push(cum);
      cum += d;
    });

    function setActive(index) {
      stepsEl.querySelectorAll('.m02-step').forEach((chip, i) => {
        chip.classList.toggle('m02-active', i === index);
      });
    }

    function syncStep(index) {
      setActive(index);
      const fill  = document.getElementById('progress-fill');
      const start = startPct[index];
      const end   = index < durations.length - 1 ? startPct[index + 1] : 100;
      const dur   = durations[index];
      fill.style.transition = 'none';
      fill.style.width = start + '%';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        fill.style.transition = `width ${dur}ms linear`;
        fill.style.width = end + '%';
      }));
      stepStartMs     = startMs[index];
      stepActivatedAt = Date.now();
    }

    if (syncFill) {
      stepSyncActive = true;
      syncStep(0);
      controller.onChange(index => syncStep(index));
    } else {
      setActive(0);
      controller.onChange(index => setActive(index));
    }
  }

  // ── Mount ──
  function mountDemo(id) {
    const el = document.getElementById('demo-' + id);
    stepSyncActive = false;

    let ctrl = null;
    if (id === 'M01' && typeof mountM02 === 'function') ctrl = mountM02(el);
    if (id === 'M02' && typeof mountM01 === 'function') ctrl = mountM01(el);
    if (id === 'C01' && typeof mountC01 === 'function') ctrl = mountC01(el);

    document.getElementById('m01-steps').style.display = 'none';
    document.getElementById('m02-steps').style.display = 'none';
    document.getElementById('c01-steps').style.display = 'none';

    if (ctrl) {
      const stepsKey = { M01: 'm01-steps', M02: 'm02-steps', C01: 'c01-steps' };
      const stepsEl = document.getElementById(stepsKey[id]);
      stepsEl.style.display = 'flex';
      buildSteps(stepsEl, ctrl, id !== 'C01');
    }

    document.getElementById('footer').style.display = (id === 'C01') ? 'none' : 'flex';

    startTimer(id);
    updatePagination(id);
  }

  // ── Navigation ──
  function goTo(index) {
    if (index < 0) index = demos.length - 1;
    if (index >= demos.length) index = 0;

    panels[current].classList.remove('active');
    dotWraps[current].classList.remove('active');

    current = index;

    panels[current].classList.add('active');
    dotWraps[current].classList.add('active');

    mountDemo(demos[current]);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  goTo(current + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    goTo(current - 1);
    if (e.key === '1') goTo(0);
    if (e.key === '2') goTo(1);
    if (e.key === '3') goTo(2);
  });

  document.getElementById('btn-next').addEventListener('click', () => goTo(current + 1));
  document.getElementById('btn-prev').addEventListener('click', () => goTo(current - 1));
  dotWraps.forEach(wrap => wrap.addEventListener('click', () => goTo(+wrap.dataset.index)));

  // Boot with M01 (AI companion)
  mountDemo('M01');
</script>
</body>
</html>
